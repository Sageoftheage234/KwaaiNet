name: CI — kwaai-compute

on:
  push:
    branches: [main]
    paths:
      - "core/crates/kwaai-inference/**"
      - "core/crates/kwaai-compression/**"
      - "core/crates/kwaai-distributed/**"
      - "projects/kwaai-compute/**"
  pull_request:
    branches: [main]
    paths:
      - "core/crates/kwaai-inference/**"
      - "core/crates/kwaai-compression/**"
      - "core/crates/kwaai-distributed/**"
      - "projects/kwaai-compute/**"

jobs:
  ci:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core -> target"
      - name: fmt
        run: cargo fmt --check -p kwaai-inference
      - name: clippy
        run: cargo clippy -p kwaai-inference -- -D warnings
      - name: test
        run: cargo test -p kwaai-inference

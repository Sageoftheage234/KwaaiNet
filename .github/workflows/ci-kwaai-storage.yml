name: CI — kwaai-storage

on:
  push:
    branches: [main]
    paths:
      - "core/crates/kwaai-storage/**"
      - "projects/kwaai-storage/**"
  pull_request:
    branches: [main]
    paths:
      - "core/crates/kwaai-storage/**"
      - "projects/kwaai-storage/**"

jobs:
  ci:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core -> target"
      - name: fmt
        run: cargo fmt --check -p kwaai-storage
      - name: clippy
        run: cargo clippy -p kwaai-storage -- -D warnings
      - name: test
        run: cargo test -p kwaai-storage

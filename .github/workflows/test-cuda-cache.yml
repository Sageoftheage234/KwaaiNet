name: Test CUDA Cache
on:
  workflow_dispatch:

jobs:
  build-cuda-linux:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    env:
      SCCACHE_VERSION: "v0.8.1"
      CUDA_COMPUTE_CAP: "80"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          curl -sSfL https://go.dev/dl/go1.22.12.linux-amd64.tar.gz | tar -C /usr/local -xzf -
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          dnf install -y -q gcc-toolset-12-gcc gcc-toolset-12-gcc-c++
          echo "NVCC_CCBIN=/opt/rh/gcc-toolset-12/root/usr/bin/gcc" >> $GITHUB_ENV
          echo "CC=/opt/rh/gcc-toolset-12/root/usr/bin/gcc" >> $GITHUB_ENV
          echo "CXX=/opt/rh/gcc-toolset-12/root/usr/bin/g++" >> $GITHUB_ENV
          dnf install -y -q 'dnf-command(config-manager)'
          dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
          dnf install -y -q cuda-toolkit-12-6 openssl-devel perl-IPC-Cmd
          echo "/usr/local/cuda-12.6/bin" >> $GITHUB_PATH
          curl -sSfL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - --strip-components=1 -C /usr/local/bin "sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache"
          chmod +x /usr/local/bin/sccache
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=/tmp/sccache" >> "$GITHUB_ENV"

      - name: Restore cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-cuda-linux-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-cuda-linux-test-

      - name: Restore sccache
        uses: actions/cache@v4
        with:
          path: /tmp/sccache
          key: sccache-cuda-linux-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: sccache-cuda-linux-test-

      - name: Restore candle CUDA kernel artifacts
        id: candle-cache
        uses: actions/cache@v4
        with:
          path: |
            core/target/release/build/candle-core-*
            core/target/release/.fingerprint/candle-core-*
          key: cuda-kernels-linux-80-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cuda-kernels-linux-80-test-

      - name: Report cache status
        shell: bash
        run: |
          echo "candle-cache hit: ${{ steps.candle-cache.outputs.cache-hit }}"
          echo "Cargo.lock hash: ${{ hashFiles('**/Cargo.lock') }}"
          if [ "${{ steps.candle-cache.outputs.cache-hit }}" = "true" ]; then
            echo "### WARM CACHE — nvcc should be skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "### COLD CACHE — nvcc will compile from scratch" >> $GITHUB_STEP_SUMMARY
          fi
          mkdir -p core/target/release
          ls core/target/release/build/candle-core-* 2>/dev/null && echo "Restored candle build dirs:" && ls core/target/release/build/ | grep candle || echo "No candle artifacts restored yet"

      - name: Build kwaainet with CUDA (timed)
        working-directory: core
        shell: bash
        run: |
          echo "Build start: $(date -u +%T)"
          time cargo build --release -p kwaainet --features cuda
          echo "Build end: $(date -u +%T)"

      - name: sccache stats
        shell: bash
        run: sccache --show-stats 2>/dev/null || true

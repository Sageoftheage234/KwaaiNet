# Ground truth Gool–Rassool family tree for the D6 memoir
# Source: NotebookLM analysis of "Y.S. Rassool: The District Six Memoir"
# Usage: kwaainet rag graph seed --file tests/d6_family_tree.yaml --kb D6
#        Run after `rag graph build` to merge aliases and plant authoritative family relations.

persons:

  # ─── Patriarch ─────────────────────────────────────────────────────────────

  - canonical: "Haji Joosub Maulvi Hamid Gool"
    aliases:
      - "J.M.H. Gool"
      - "JMH Gool"
      - "J. Gool"
      - "Joosub Gool"
      - "Joosub Maulvi Hamid Gool"
    description: >
      Patriarch of the Gool family; Gujarat-born merchant who migrated to South Africa in 1884
      and built a 13-room mansion at 7 Buitencingle Street, Cape Town. Had two wives: Bibi
      (Peari Beghum) and Wahida Ta'al. Died April 1, 1940.

  - canonical: "Bibi Gool"
    aliases:
      - "Bibi"
      - "Peari Beghum"
    description: >
      First wife of J.M.H. Gool; married in an arranged marriage in India around 1879/1880.
      Joined her husband in Cape Town in 1901 after a 20-year separation. Mother of Ayesha
      (Lallie), Mohamed Saaid (Aity), and Zohra (Jolly).

  - canonical: "Wahida Gool"
    aliases:
      - "Wahida Ta'al"
      - "Wahida"
      - "Hajima"
    description: >
      Second wife of J.M.H. Gool; a local Cape woman of the Dollie clan, married in Cape Town
      while Bibi was still in India. Mother of Abdul Hamid (BG), Goolam (GH), Jane, Minnie,
      Fatima (Timmie), Mariam (Margie), Zobeida (Billy), and Mohammed Hanief (Aboeta).

  # ─── Branch 1: JMH + Bibi ──────────────────────────────────────────────────

  - canonical: "Ayesha Rassool"
    aliases:
      - "Lallie"
      - "Ayesha"
      - "Lallie Gool"
      - "Ayesha Gool"
    description: >
      Daughter of J.M.H. Gool and Bibi, born 1899/1900. The author's mother, known as Lallie.
      Married Peter Alexander Rassool (Peru/Peerbhai) in 1928. Mother of Yousuf (Joe), Abdul,
      Fazil, Zain, Rasheda, Berina, Yasmin (Jessie), and Nasim.

  - canonical: "Mohamed Saaid Gool"
    aliases:
      - "Aity (Mohamed Saaid Gool)"
      - "Uncle Aity"
      - "Aity"
    description: >
      Son of J.M.H. Gool and Bibi, born in Mauritius in 1901. Businessman; married Annie Rassool,
      sister of Peter Alexander Rassool. Father of Nasima and identical twins Nurjehan and Zarina.

  - canonical: "Zohra Abdurahman"
    aliases:
      - "Zohra (Auntie Jolly)"
      - "Auntie Jolly"
      - "Aunt Jolly"
      - "Jolly (Zohra)"
      - "Jolly"
      - "Zohra"
    description: >
      Daughter of J.M.H. Gool and Bibi. Known as Auntie Jolly. Married Ahmed Abdurahman
      (Uncle Mamoo) in 1936. Had nine children including Ismail and Joss (Joosub).

  # ─── Branch 2: JMH + Wahida ────────────────────────────────────────────────

  - canonical: "Abdul Hamid Gool"
    aliases:
      - "A.H. Gool"
      - "AH Gool"
      - "Abdul Hamid (BG)"
      - "Abdul Hamid"
    description: >
      Son of J.M.H. Gool and Wahida, born 1886. Prominent physician and mentor to the family.
      Known by the nicknames BG and Cheops. Married Zainunnisa (Cissie) Gool, daughter of
      Dr. Abdulla Abdurahman. Father of Shaheen Gool.

  - canonical: "Goolam Gool"
    aliases:
      - "Dr Goolam Gool"
      - "Dr. Goolam"
      - "Goolam (GH)"
      - "Goolam"
      - "Dr_ Goolam"
    description: >
      Son of J.M.H. Gool and Wahida. Medical doctor and key leader in the Non-European Unity
      Movement (NEUM). Known by the initials G.H. Married Halima. Father of Selim Gool.

  - canonical: "Jane Gool-Tabata"
    aliases:
      - "Jane Gool"
      - "Janab"
    description: >
      Daughter of J.M.H. Gool and Wahida. Teacher and radical political activist. Married
      political leader I.B. Tabata.

  - canonical: "Minnie Gool"
    aliases:
      - "Amina Gool"
    description: >
      Daughter of J.M.H. Gool and Wahida. Nurse and political activist. Briefly married to
      the German Stalinist Hans Friederichs. Mother of Nina and Daria.

  - canonical: "Fatima Gool"
    aliases:
      - "Fatima (Timmie)"
      - "Timmie"
      - "my Auntie Timmie"
      - "Aunt Fatima"
    description: >
      Daughter of J.M.H. Gool and Wahida. Student of religion and receptionist at her
      brother's surgery. Remained single after a forbidden romance with Manilal Gandhi.

  - canonical: "Mariam Gool"
    aliases:
      - "Margie"
      - "Mariam (Margie)"
    description: >
      Daughter of J.M.H. Gool and Wahida. Professional midwife who delivered many of
      the author's siblings.

  - canonical: "Zobeida Gool"
    aliases:
      - "Billy"
      - "Zobeida (Billy)"
    description: >
      Daughter of J.M.H. Gool and Wahida. One of the first Cape Malay/Indian girls to earn
      a Bachelor of Arts degree.

  - canonical: "Mohammed Hanief Gool"
    aliases:
      - "Mohammed Hanief"
      - "Aboeta"
    description: >
      Son of J.M.H. Gool and Wahida. Described as the black sheep of the family; Lallie's
      half-brother.

  # ─── Abdurahman family (connected by marriage) ─────────────────────────────

  - canonical: "Dr. Abdulla Abdurahman"
    aliases:
      - "Abdulla Abdurahman"
      - "Abdullah Abdurahman"
      - "Dr. Abdullah Abdurahman"
      - "Dr. Abdurahman"
    description: >
      Physician and patriarch of the Abdurahman family; one of Cape Town's leading political
      dynasties. Father of Zainunnisa (Cissie) Gool.

  - canonical: "Cissie Gool"
    aliases:
      - "Zainunnisa Cissie Gool"
      - "Zainunnisa Gool"
    description: >
      Daughter of Dr. Abdulla Abdurahman; prominent political activist in Cape Town. Married
      Dr. Abdul Hamid Gool, joining the Gool family. Mother of Shaheen Gool.

  # ─── Rassool family ─────────────────────────────────────────────────────────

  - canonical: "Peter Alexander Rassool"
    aliases: []
    description: >
      The author's father, known as Peru or Peerbhai. Married Ayesha (Lallie) Gool in 1928.
      Sibling of Annie Rassool.

  - canonical: "Annie Rassool"
    aliases: []
    description: >
      Sibling of Peter Alexander Rassool; married Mohamed Saaid (Aity) Gool, creating a second
      bond between the Rassool and Gool families.

  - canonical: "Yousuf Rassool"
    aliases:
      - "Joe Rassool"
      - "Yousuf (Joe) Rassool"
      - "Yusuf Rassool"
    description: >
      The author of the memoir. Son of Ayesha (Lallie) Gool and Peter Alexander Rassool.
      Born and raised in District Six, Cape Town. Eldest child of the family.

  # ─── Fostered relatives (the Ally/Noor line) ───────────────────────────────

  - canonical: "Gadija Noor"
    aliases:
      - "Gadija"
      - "Auntie Dij"
    description: >
      Fostered by J.M.H. Gool and Wahida after her father Barrabhai's wife died in the 1918 flu
      epidemic. Beloved teacher who married tailor Ismail Davids. Mother of Shawquet, Rashid,
      Zaheer, Nurjahan, and Yusuf.

  - canonical: "Hanief Ally"
    aliases:
      - "Uncle Hanief"
      - "Sayed Hanief Ally"
      - "Hanief"
    description: >
      Fostered by J.M.H. Gool and Wahida; son of Barrabhai (Bibi's brother). A mentor to the
      author. Known as Uncle Hanief.

  - canonical: "Toetie Ally"
    aliases:
      - "Toetie"
      - "Auntie Toetie"
    description: >
      Fostered by J.M.H. Gool and Wahida; daughter of Barrabhai. Worked as a midwife.

  - canonical: "Hamid Ally"
    aliases:
      - "Midi"
    description: >
      Fostered by J.M.H. Gool and Wahida; son of Barrabhai. A talented athlete who died young
      of consumption.

  # ─── I.B. Tabata (Jane's husband) ──────────────────────────────────────────

  - canonical: "I.B. Tabata"
    aliases:
      - "Tabata"
      - "I. Tabata"
      - "Mr. Tabata"
      - "Dr. Tabata"
      - "B.M. Tabata"
    description: >
      Political leader and husband of Jane Gool-Tabata. Key figure in the Non-European Unity
      Movement (NEUM) in South Africa.

relations:

  # ─── JMH Gool's two marriages ──────────────────────────────────────────────
  - from: "Haji Joosub Maulvi Hamid Gool"
    to: "Bibi Gool"
    type: "spouse_of"
  - from: "Haji Joosub Maulvi Hamid Gool"
    to: "Wahida Gool"
    type: "spouse_of"

  # ─── Branch 1 parent_of ────────────────────────────────────────────────────
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Ayesha Rassool",     type: "parent_of" }
  - { from: "Bibi Gool",                     to: "Ayesha Rassool",     type: "parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Mohamed Saaid Gool", type: "parent_of" }
  - { from: "Bibi Gool",                     to: "Mohamed Saaid Gool", type: "parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Zohra Abdurahman",   type: "parent_of" }
  - { from: "Bibi Gool",                     to: "Zohra Abdurahman",   type: "parent_of" }

  # ─── Branch 2 parent_of ────────────────────────────────────────────────────
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Abdul Hamid Gool",    type: "parent_of" }
  - { from: "Wahida Gool",                   to: "Abdul Hamid Gool",    type: "parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Goolam Gool",         type: "parent_of" }
  - { from: "Wahida Gool",                   to: "Goolam Gool",         type: "parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Jane Gool-Tabata",    type: "parent_of" }
  - { from: "Wahida Gool",                   to: "Jane Gool-Tabata",    type: "parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Minnie Gool",         type: "parent_of" }
  - { from: "Wahida Gool",                   to: "Minnie Gool",         type: "parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Fatima Gool",         type: "parent_of" }
  - { from: "Wahida Gool",                   to: "Fatima Gool",         type: "parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Mariam Gool",         type: "parent_of" }
  - { from: "Wahida Gool",                   to: "Mariam Gool",         type: "parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Zobeida Gool",        type: "parent_of" }
  - { from: "Wahida Gool",                   to: "Zobeida Gool",        type: "parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Mohammed Hanief Gool", type: "parent_of" }
  - { from: "Wahida Gool",                   to: "Mohammed Hanief Gool", type: "parent_of" }

  # ─── Marriages ─────────────────────────────────────────────────────────────
  - { from: "Ayesha Rassool",    to: "Peter Alexander Rassool", type: "spouse_of" }
  - { from: "Mohamed Saaid Gool", to: "Annie Rassool",          type: "spouse_of" }
  - { from: "Zohra Abdurahman",  to: "Ahmed Abdurahman",        type: "spouse_of" }
  - { from: "Abdul Hamid Gool",  to: "Cissie Gool",             type: "spouse_of" }
  - { from: "Jane Gool-Tabata",  to: "I.B. Tabata",             type: "spouse_of" }

  # ─── Abdurahman → Cissie ───────────────────────────────────────────────────
  - { from: "Dr. Abdulla Abdurahman", to: "Cissie Gool", type: "parent_of" }

  # ─── Joe Rassool's parents ─────────────────────────────────────────────────
  - { from: "Ayesha Rassool",         to: "Yousuf Rassool", type: "parent_of" }
  - { from: "Peter Alexander Rassool", to: "Yousuf Rassool", type: "parent_of" }

  # ─── Children of Abdul Hamid + Cissie ──────────────────────────────────────
  - { from: "Abdul Hamid Gool", to: "Shaheen Gool", type: "parent_of" }
  - { from: "Cissie Gool",      to: "Shaheen Gool", type: "parent_of" }

  # ─── Goolam Gool's child ───────────────────────────────────────────────────
  - { from: "Goolam Gool", to: "Selim Gool", type: "parent_of" }

  # ─── Foster relations ──────────────────────────────────────────────────────
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Gadija Noor",  type: "foster_parent_of" }
  - { from: "Wahida Gool",                   to: "Gadija Noor",  type: "foster_parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Hanief Ally",  type: "foster_parent_of" }
  - { from: "Wahida Gool",                   to: "Hanief Ally",  type: "foster_parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Toetie Ally",  type: "foster_parent_of" }
  - { from: "Wahida Gool",                   to: "Toetie Ally",  type: "foster_parent_of" }
  - { from: "Haji Joosub Maulvi Hamid Gool", to: "Hamid Ally",   type: "foster_parent_of" }
  - { from: "Wahida Gool",                   to: "Hamid Ally",   type: "foster_parent_of" }

  # ─── Half-siblings (share JMH Gool as father, different mothers) ───────────

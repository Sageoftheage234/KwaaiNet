    description: "The Indian Opinion was a weekly newspaper founded by Mahatma Gandhi in 1903 in Natal, South Africa, to advocate for the rights of Indians through passive resistance and non-violent satyagraha. Gandhi's friendship with the Gool family — particularly his stay at the Buitencingle mansion in Cape Town in February 1914 during a critical phase of the satyagraha campaign — was documented in the Indian Opinion. Gandhi later returned to India where he continued his non-violent leadership."
    aliases:

  - canonical: "J.M.H. Gool & Co."
    entity_type: Organization
    description: "Joosub Maulvi Hamid Gool — the author's grandfather and founder of J.M.H. Gool & Co. — came from the Province of Swat in India; his family moved from Swat to Rander in Gujarat before Joosub journeyed to the Cape via Mauritius, arriving in 1884, leaving behind his young bride in India. He was a prosperous spice merchant who founded the Hanaffi mosque, based at his family mansion at No. 7 Buitencingle Street — a cobbled street in the Dutch belt of Cape Town at the foot of Table Mountain. The Buitencingle mansion was a celebrated gathering place visited by Mahatma Gandhi, Cecil Rhodes, Dr. Abdullah Abdurahman, and George Bernard Shaw; Gandhi's friendship with Gool is documented in the Indian Opinion newspaper. He had two wives — Bibi Gool (mother of Ayesha, Mohamed Saaid, and Zohra) and Wahida Gool (mother of Abdul Hamid, Goolam, Jane, Fatima, Mariam, Zobeida, and Mohammed Hanief) — and his son Dr. Abdul Hamid Gool married Zainunnissa Cissie Abdurahman (daughter of Dr. Abdullah Abdurahman), making Cissie a daughter-in-law of the Gool family."
    aliases:
      - "JMH Gool & Co"
      - "J.M.H Gool & Co"

  - canonical: "Hewat Training College"
    entity_type: Organization
    description: "Hewat Training College was a teacher training college for Coloured students in Cape Town, preparing them to teach in Coloured schools. Students gained practical classroom teaching experience during their college years. It was closely connected to the political and cultural life of the Cape Coloured community through its students and staff."

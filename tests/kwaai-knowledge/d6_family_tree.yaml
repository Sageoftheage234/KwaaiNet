    description: >-
      Zainunnissa (Cissie) Gool was a renowned Cape Town politician and
      community activist, daughter of Dr. Abdullah Abdurahman. She was NOT a
      blood descendant of J.M.H. Gool — she married into the family. She
      married Dr. Abdul Hamid Gool (B.G. Cheops), who was a son of J.M.H.
      Gool and his second wife Wahida, making Cissie Gool the daughter-in-law
      of J.M.H. Gool. She served as a Cape Town city councillor and was known
      for her fiery speeches and dedication to non-European rights. She was a
      key figure in the Non-European Unity Movement and one of the foremost
      women activists of her time in South Africa.


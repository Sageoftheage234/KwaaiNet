  # ─── Patriarch ─────────────────────────────────────────────────────────────

  - canonical: "Haji Joosub Maulvi Hamid Gool"
    gender: "Male"
    aliases:
      - "J.M.H. Gool"
      - "JMH Gool"
      - "J. Gool"
      - "Joosub Gool"

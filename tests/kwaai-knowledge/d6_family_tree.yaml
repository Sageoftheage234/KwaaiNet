      Dr. Abdullah Abdurahman was a long-serving Cape Town city councillor
      and one of the most prominent political figures in the Cape Coloured
      community in the early twentieth century. He was a medical doctor and
      father of Cissie Gool (Zainunnissa Gool), the well-known activist and
      city councillor. Dr. Abdurahman was known personally to J.M.H. Gool
      and visited the Gool family mansion at Buitencingle Street.

  - canonical: "Cissie Gool"
    aliases:

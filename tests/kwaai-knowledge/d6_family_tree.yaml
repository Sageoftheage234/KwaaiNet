    description: >-
      Ayesha Lallie Gool was the author's mother, daughter of Haji Joosub
      Maulvi Hamid Gool and his first wife Bibi Gool. She grew up in the
      grand Gool mansion at 7 Buitencingle Street in District Six. She
      married Peter Alexander Rassool (Peerbhai) and raised eight children:

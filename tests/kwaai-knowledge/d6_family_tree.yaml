# Ground truth Gool–Rassool family tree for the D6 memoir
# Source: NotebookLM analysis of "Y.S. Rassool: The District Six Memoir"
# Usage: kwaainet rag graph seed --file tests/d6_family_tree.yaml --kb D6
#        Run after `rag graph build` to merge aliases and plant authoritative family relations.
#
# NOTE: descriptions are intentionally omitted — they are set by dream extraction from the text.
# The seed provides canonical names, aliases, and family relations only.

persons:

  # ─── Patriarch ─────────────────────────────────────────────────────────────

  - canonical: "Haji Joosub Maulvi Hamid Gool"
    gender: "Male"
    aliases:
      - "J.M.H. Gool"
      - "JMH Gool"
      - "J. Gool"
      - "Joosub Gool"
      - "Joosub Maulvi Hamid Gool"
      - "Joosub Maulvi Hamid"
      - "Haji Joosub Maulvi Hamid Gooli"
      - "Joosub Maulvi Hamid Gooli"
      - "Grandpa"
      - "grandfather"
      - "my grandpa"
      - "my grandfather"
      - "Grandpa Gool"
      - "Gool"
    description: >-
      Haji Joosub Maulvi Hamid Gool was the author's maternal grandfather, a
      prosperous merchant from India who arrived at the Cape via Mauritius in
      1884. His father was a Pushto-speaking Maulvi from the Province of Swat
      who had moved to Rander in Gujarat. Joosub left behind his
      eleven-year-old bride in India and came to Cape Town where he established
      J.M.H. Gool & Co. at 25 Church Street, supplying spices and becoming a
      supplier to the troops of Queen Victoria during the Anglo-Boer War. He
      founded the Hanaffi Quwatul Islam Mosque in Loop Street (completed 1898),
      built the grand 13-room mansion at 7 Buitencingle Street, and knew
      Gandhi, Cecil Rhodes, and Dr. Abdullah Abdurahman personally.

  - canonical: "Bibi Gool"
    gender: "Female"
    aliases:
      - "Bibi"
      - "Peari Beghum"
    description: >-
      Bibi Gool (Peari Beghum) was the first wife of Haji Joosub Maulvi Hamid
      Gool. She was mother to Ayesha (Lallie), Mohamed Saaid, and Zohra.

  - canonical: "Wahida Gool"
    gender: "Female"
    aliases:
      - "Wahida Ta'al"
      - "Wahida"
      - "Hajima"
    description: >-
      Wahida Gool (Hajima) was the second wife of Haji Joosub Maulvi Hamid
      Gool. She was mother to Abdul Hamid, Goolam, Jane, Minnie, Fatima,
      Mariam, Zobeida, and Mohammed Hanief.

  # ─── Branch 1: JMH + Bibi ──────────────────────────────────────────────────


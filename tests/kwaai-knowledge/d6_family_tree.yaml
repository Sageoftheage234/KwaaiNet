    description: >-
      Yousuf (Joe) Rassool (Y.S. Rassool) is the author and narrator of this
      memoir about District Six, Cape Town. He was a teacher and community
      activist, deeply involved in the Teachers League of South Africa (TLSA),
      the Non-European Unity Movement (NEUM), and the New Era Fellowship
      (NEF). He was a keen cricketer who played in the non-European cricket
      structure in Cape Town. He is married to Professor Nazima Rassool and
      has three children: Feyruz, Reza, and Zarina.

  - canonical: "Nazima Rassool"
    gender: "Female"
    aliases:
      - "Nazima"
      - "Professor Nazima Rassool"
      - "Prof. Nazima Rassool"
    description: >-
      Professor Nazima Rassool is the author's wife and an academic
      researcher. She urged the author not to rely solely on personal memories
      but to ground his memoir in historical research. Her insistence on
      scholarly rigour produced staggering information that transformed the
      book from a purely subjective family recollection into a work revealing
      a rich historical layer previously unrecorded by any historian.


  - canonical: "Hanaffi Quwatul Islam Mosque"
    entity_type: Organization
    description: "The Hanaffi Quwatul Islam Mosque — also called the Hanaffi Mosque or the Loop Street Mosque — is a Cape Town mosque completed in 1898 on Loop Street. It was founded by Haji Joosub Maulvi Hamid Gool, who served as its founder and life trustee. A whitewashed structure with a domed minaret, the Hanaffi mosque was an outpost of Islam in an increasingly European neighbourhood, and served as a central religious and community gathering place for the Muslim families of District Six. The name 'Hanaffi' (also spelled Hanafi) refers to the Hanafi school of Islamic jurisprudence that the mosque follows."
    aliases:

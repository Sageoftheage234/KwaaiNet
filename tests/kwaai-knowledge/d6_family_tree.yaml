  # ─── Key places ───────────────────────────────────────────────────────────────

  - canonical: "District Six"
    entity_type: Place
    description: "District Six was a vibrant, multicultural community in Cape Town, nestled below Devil's Peak between the city centre and the harbour. Its richly diverse residents — Coloured, Malay, African, and others — built a neighbourhood celebrated for jazz, warmth, and community spirit. In 1966 it was declared a White Group Area under the Group Areas Act. Under the Group Areas Act, the community suffered forced removals: non-White residents were expelled to the Cape Flats; their homes were demolished and the land bulldozed flat, leaving only the mosques and churches standing. The forced removals destroyed one of Cape Town's most vibrant communities."
    aliases:
      - "District 6"
      - "the District"
      - "Distrik Ses"
      - "District Six: Lest we Forget"
      - "Lest we Forget"
      - "Ben District Six"
      - "District Six Museum"
      - "District Six community"
      - "the district of District Six"

  - canonical: "Cape Flats"
    entity_type: Place
    aliases:
      - "the Cape Flats"
      - "Flats"

  - canonical: "Kloof Nek"
    entity_type: Place
    description: "Kloof Nek is a mountain saddle in Cape Town connecting Table Mountain to Lion's Head. Kloof Street leads up from the city through the Glen — a wooded dell of haunting beauty — to the Kloof Nek saddle. The area lies above Buitencingle Street and was a beloved retreat for the author and his friends, who read poetry among its trees."
    aliases:
      - "Kloof Nek Pass"

  - canonical: "7 Buitencingle Street"
    entity_type: Place
    description: "7 Buitencingle Street (No. 7) was a grand 13-room mansion in the Dutch belt of Cape Town, set on a wide cobbled street at the foot of Table Mountain. The word 'cingle' referred to a belt, and Buitencingle was at that time the outermost belt of Cape Town. The mansion was the family home of the author's grandfather, Haji Joosub Maulvi Hamid Gool, and was a celebrated gathering place. Notable visitors included Solly Joel, Cecil Rhodes, Mahatma Gandhi, the Prince of Wales, George Bernard Shaw, and Sarojini Naidu."
    aliases:
      - "Buitencingle Street"
      - "Buitencingle"
      - "the Buitencingle mansion"
      - "7 Buitenkingle Street"
      - "No. 7 Buitencingle"


      1893 to 1914 and organised the Indian community's resistance to
      discriminatory legislation, developing his method of non-violent
      resistance (satyagraha). He knew J.M.H. Gool personally, visited the
      Gool family mansion at 7 Buitencingle Street, and was a subscriber to
      the Indian Opinion. His connection to the Gool family is documented
      in archival correspondence.


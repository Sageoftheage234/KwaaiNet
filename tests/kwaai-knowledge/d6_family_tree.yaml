      Abdul Hamid Gool (known as B.G. or Cheops) was a son of Haji Joosub
      Maulvi Hamid Gool and his second wife Wahida. He studied medicine in
      London and was known in Cape Town for his commanding personality and
      pharaonic bearing. He married Cissie Gool (Zainunnissa), daughter of
      Dr. Abdullah Abdurahman. He was a doctor and prominent figure in the

      Zainunnissa (Cissie) Gool was a renowned Cape Town politician and
      community activist, daughter of Dr. Abdullah Abdurahman. She served as
      a Cape Town city councillor and was known for her fiery speeches and
      dedication to non-European rights. She was a key figure in the
      Non-European Unity Movement and one of the foremost women activists of
      her time in South Africa. She married Dr. Abdul Hamid Gool (B.G.).

  # ─── Rassool family ─────────────────────────────────────────────────────────

  - canonical: "Peter Alexander Rassool"
    gender: "Male"
    aliases: []
    description: >-
      Peter Alexander Rassool was the author's father. He converted to Islam
      and thereafter became known as Peerbhai (or Peru, as Ayesha called him).
      He was circumcised as an adult, an event recounted in the memoir. He
      married Ayesha Lallie Gool (daughter of J.M.H. Gool) and was the father
      of Yousuf, Abdul, Fazil, Zain, Rasheda, Berina, Yasmin, and Nasim.

  - canonical: "Annie Rassool"

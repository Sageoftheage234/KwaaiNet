      League of South Africa (TLSA) and the Non-European Unity Movement (NEUM).
      He was a leading advocate of the non-collaboration policy against apartheid.

  # ─── Key organizations ───────────────────────────────────────────────────────

  - canonical: "Non-European Unity Movement"
    entity_type: Organization
    aliases:
      - "NEUM"
      - "Non European Unity Movement"
    description: >-
      The Non-European Unity Movement (NEUM) was a South African political
      movement founded in 1943 that united non-European political organisations
      opposed to apartheid and racial discrimination. It advocated non-collaboration
      with apartheid institutions and was closely connected to the All African
      Convention and the Teachers League of South Africa.

  - canonical: "Teachers League of South Africa"
    entity_type: Organization
    aliases:
      - "TLSA"
      - "Teachers' League of South Africa"
    description: >-
      The Teachers League of South Africa (TLSA) was a non-European teachers'
      professional body that took a strong political stance against apartheid
      education policies. Yousuf Rassool was an active member and involved in
      its work.

  - canonical: "New Era Fellowship"
    entity_type: Organization
    aliases:
      - "NEF"
    description: >-
      The New Era Fellowship (NEF) was a Cape Town educational and cultural
      organisation that held public lectures and discussions on political and
      social issues. It was closely associated with the Non-European Unity
      Movement and was attended by leading anti-apartheid intellectuals.

  - canonical: "All African Convention"
    entity_type: Organization
    aliases:
      - "AAC"
      - "All-African Convention"
    description: >-
      The All African Convention (AAC) was a South African political body
      formed in 1935 and affiliated with the Non-European Unity Movement.
      It represented African political organisations opposed to the Hertzog
      Bills and continued to oppose apartheid alongside the NEUM.

  - canonical: "Hanaffi Quwatul Islam Mosque"
    entity_type: Organization
    aliases:
      - "Quwatul Islam Mosque"
      - "Loop Street Mosque"
      - "Hanafi Mosque"
      - "Hanaffi Mosque"
    description: >-
      The Hanaffi Quwatul Islam Mosque in Loop Street, Cape Town, was founded
      by Haji Joosub Maulvi Hamid Gool and completed in 1898. It served the
      Muslim community of District Six and the surrounding area.

  - canonical: "Indian Opinion"
    entity_type: Organization
    aliases:
      - "Indian Opinion Dec 29_ 1906 p986"
      - "Indian Opinion Dec 29, 1906 p986"
      - "Gandhi's Indian Opinion"
      - "Gandhi Indian Opinion"
    description: >-
      Indian Opinion was a weekly newspaper founded by Mahatma Gandhi in 1903
      in Natal, South Africa. It was Gandhi's primary publication vehicle during
      his years in South Africa and covered the struggle for Indian rights.
      It is cited in the D6 memoir as a primary source for events involving
      J.M.H. Gool and the Indian community in Cape Town.

  # ─── Key places ───────────────────────────────────────────────────────────────

  - canonical: "District Six"
    entity_type: Place
    aliases:
      - "District 6"
      - "the District"
    description: >-
      District Six was a vibrant, multi-cultural inner-city neighbourhood of
      Cape Town, South Africa. It was home to the Rassool and Gool families
      and thousands of other residents before the apartheid government forcibly
      removed its population and demolished its homes under the Group Areas Act
      in the 1970s and 1980s.

  - canonical: "7 Buitencingle Street"
    entity_type: Place
    aliases:
      - "Buitencingle Street"
      - "the Buitencingle mansion"
      - "7 Buitenkingle Street"
    description: >-
      7 Buitencingle Street was the grand 13-room mansion in District Six built
      by Haji Joosub Maulvi Hamid Gool. It was the family home of the Gool
      family and a gathering place for prominent visitors including Gandhi and
      Dr. Abdullah Abdurahman.


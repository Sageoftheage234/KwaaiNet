    description: >-
      Yousuf (Joe) Rassool (Y.S. Rassool) is the author and narrator of this
      memoir about District Six, Cape Town. He was a teacher and community
      activist, deeply involved in the political organisations active in the
      Cape Coloured community: the Teachers League of South Africa (TLSA),
      the Non-European Unity Movement (NEUM), the New Era Fellowship (NEF),
      and the All African Convention (AAC) — the four major organisations
      that opposed apartheid and racial discrimination together. He was a
      keen cricketer who played club cricket in District Six and Cape Town,
      representing Western Province in the non-European cricket structure.
      He is married to Professor Nazima Rassool and has three children:
      Feyruz, Reza, and Zarina, and six grandchildren: Joseph, Samuel,
      Alexander, Leonardo, Dylan, and Lewis.


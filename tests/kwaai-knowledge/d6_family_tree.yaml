  - canonical: "Non-European Unity Movement"
    entity_type: Organization
    description: "The Non-European Unity Movement (NEUM) was a South African anti-apartheid political movement founded on a Ten Point programme of full democratic rights. Its core principle was non-collaboration — the refusal of non-European people to collaborate with apartheid institutions. The NEUM deployed the boycott as its primary political weapon, most notably the boycott of the Coloured Advisory Council (C.A.C.) in 1943. The Teachers League of South Africa (TLSA), representing Coloured teachers, was closely affiliated with the NEUM and adopted the same boycott and non-collaboration principles; the teachers of the TLSA were among the leading voices in the NEUM's non-European unity campaign. The NEUM was also affiliated with the New Era Fellowship."
    aliases:
      - "NEUM"
      - "Non European Unity Movement"
      - "Unity Movement"


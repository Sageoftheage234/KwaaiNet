    description: >-
      Mohandas Karamchand Gandhi (Mahatma Gandhi) was a lawyer who came to
      South Africa in 1893 initially to work on a legal case for an Indian
      firm. He remained until 1914, becoming deeply involved in organising the
      Indian community's resistance to discriminatory legislation and developing
      his method of non-violent resistance (satyagraha). He knew J.M.H. Gool
      personally, visited the Gool family mansion at 7 Buitencingle Street,
      and founded and edited the Indian Opinion. His connection to the Gool
      family is documented in archival correspondence.


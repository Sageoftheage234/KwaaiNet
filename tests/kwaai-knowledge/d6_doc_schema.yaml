schema_type: "Book"
document_title: "District Six - Lest We Forget"
default_narrator: "Yousuf (Joe) Rassool"

# schema.org Book metadata
metadata:
  author: "Yousuf (Joe) Rassool"
  about: "memoir, District Six, Cape Town, apartheid, forced removals, South Africa"
  subject: "memoir, District Six, Cape Town, apartheid, forced removals, South Africa"
  datePublished: "2024"
  year: "1984"
  copyrightYear: "2024"
  copyrightHolder: "Y.S. Rassool"
  publisher: "Amazon Kindle Direct Publishing"
  bookEdition: "Fourth edition"
  isbn: "1495295613"
  inLanguage: "en"
  genre: "Memoir / History"
  name: "District Six - Lest We Forget"

# Section definitions — first matching pattern wins.
# skip: true       → skip LLM entity extraction (noisy/non-narrative text)
# index_seeds: true → parse entries as entity name seeds; still skips LLM extraction
sections:
  - pattern: "CONTENTS"
    skip: true
    section_type: table_of_contents

  - pattern: "Acknowledgements"
    skip: true
    section_type: acknowledgements

  - pattern: "Dedication"
    skip: true
    section_type: front_matter

  - pattern: "Preface"
    section_type: preface

  - pattern: "Editor's Note"
    section_type: editor_note
    narrator_note: >
      IMPORTANT: This section is the Editor's Note — it was written by the EDITOR,
      not by the memoir author Yousuf (Joe) Rassool. The pronoun "I" in this section
      refers to the editor. Do NOT attribute first-person statements in this section
      to Yousuf Rassool. If the editor mentions a person by name, extract that person
      normally, but do not create relations from "I" to Yousuf Rassool.

  - pattern: "INDEX"
    skip: true
    index_seeds: true
    section_type: index

  - pattern: "APPENDIX"
    skip: true
    section_type: appendix

  - pattern: "ENDNOTES"
    skip: true
    section_type: end_notes
